bundle:
  name: crm-webanalytics-ingest

# IMPORTANT: Set your workspace host below
workspace:
  host: https://<YOUR_WORKSPACE>.cloud.databricks.com

variables:
  catalog:
    description: "Unity Catalog catalog name"
    default: "main"
  schema:
    description: "Schema for all tables (Bronze, Silver, Gold)"
    default: "crm_webanalytics"
  lakebase_catalog:
    description: "UC catalog that federates Lakebase PostgreSQL"
    default: "crm_app_lakebase"
  workspace_url:
    description: "Full Databricks workspace URL (e.g. https://my-workspace.cloud.databricks.com)"
    default: "https://<YOUR_WORKSPACE>.cloud.databricks.com"
  workspace_id:
    description: "Databricks workspace numeric ID"
    default: "<YOUR_WORKSPACE_ID>"
  cloud_region:
    description: "Cloud region (e.g. us-west-2, us-east-1, eu-west-1)"
    default: "us-west-2"
  secrets_scope:
    description: "Databricks secrets scope with SP credentials and Lakebase password"
    default: "crm-zerobus-sp"

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true

  staging:
    variables:
      schema: "crm_webanalytics_staging"

  prod:
    mode: production
    variables:
      schema: "crm_webanalytics_prod"
