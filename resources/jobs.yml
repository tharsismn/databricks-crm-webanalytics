resources:
  jobs:
    # ── Job 1: Setup + Ingestão contínua via ZeroBus ──
    crm_webanalytics_bronze_setup:
      name: "[${bundle.target}] CRM WebAnalytics - Bronze Setup + ZeroBus Ingest"
      tags:
        domain: "crm"
        layer: "bronze"
        source: "zerobus-rest"
      tasks:
        - task_key: setup_tables
          description: "Cria schema, tabelas Bronze e concede permissões ao SP"
          spark_python_task:
            python_file: ../src/ingestion/setup_bronze_tables.py
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "${var.schema}"
              - "--client-id"
              - "${var.sp_client_id}"
          environment_key: default

        - task_key: zerobus_ingest
          description: "Envia eventos via ZeroBus REST API (100 rps contínuo)"
          depends_on:
            - task_key: setup_tables
          spark_python_task:
            python_file: ../src/ingestion/zerobus_producer.py
            parameters:
              - "--workspace-url"
              - "${var.workspace_url}"
              - "--workspace-id"
              - "${var.workspace_id}"
              - "--region"
              - "${var.zerobus_region}"
              - "--secrets-scope"
              - "${var.secrets_scope}"
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "${var.schema}"
              - "--continuous"
              - "--target-rps"
              - "100"
              - "--max-clicks"
              - "1000000"
              - "--batch-size"
              - "100"
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "1"

    # ── Job 2: Synced Tables (Gold -> Lakebase) ──
    crm_webanalytics_medallion:
      name: "[${bundle.target}] CRM WebAnalytics - Lakebase Sync"
      tags:
        domain: "crm"
        layer: "lakebase-sync"
      tasks:
        - task_key: sync_to_lakebase
          description: "Cria synced tables Gold -> Lakebase PostgreSQL"
          spark_python_task:
            python_file: ../src/synced_tables/create_synced_tables.py
            parameters:
              - "--source-catalog"
              - "${var.catalog}"
              - "--source-schema"
              - "crm_webanalytics"
              - "--lakebase-catalog"
              - "${var.lakebase_catalog}"
              - "--lakebase-schema"
              - "crm_app"
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "1"
